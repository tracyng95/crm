name: ADF-CD-Deploy-to-Production

trigger: none                    # Trigger manually (recommended)

resources:
  pipelines:
    - pipeline: 'ADF-CI-Pipeline'
      source: 'ADF-CI-Validate-and-Export'   # ← Change to your actual CI pipeline name
      trigger: 
        branches:
          include:
            - develop

variables:
  Prod_ResourceGroup: 'rg-cic-crm-prd'
  Prod_DataFactory: 'adf-cic-crm-prd-001'
  SubscriptionId: '2c349f16-c9e8-4662-b25b-453d175bee12'

stages:
- stage: Deploy_Production
  displayName: 'Deploy to Production'
  jobs:
  - deployment: DeployToProd
    displayName: 'Deploy ADF to Production'
    environment: 'Production'           # We will add approval here
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          # Download ARM Template from CI          
          # ============================================
          - task: DownloadPipelineArtifact@2
            displayName: 'Download ARM Template Artifact'
            inputs:
              buildType: 'specific'
              project: '$(System.TeamProject)'
              definition: 'ADF-CI-Validate-and-Export'   # ← Make sure this matches your CI pipeline name exactly
              buildVersionToDownload: 'latest'
              artifactName: 'ArmTemplates'
              downloadPath: '$(Pipeline.Workspace)/ArmTemplates'

          # ============================================
          # DEBUG: Show exact folder structure
          # ============================================
          - task: Bash@3
            displayName: '🔍 Debug - List Downloaded Files'
            inputs:
              targetType: 'inline'
              script: |
                echo "=== Workspace contents ==="
                ls -R $(Pipeline.Workspace)
                echo "=== ArmTemplates contents ==="
                ls -R $(Pipeline.Workspace)/ArmTemplates || echo "ArmTemplates folder not found"

          # ============================================
          # Pre-deployment: Stop Triggers
          # ============================================
          - task: AzurePowerShell@5
            displayName: 'Stop ADF Triggers (Pre-Deployment)'
            inputs:
              azureSubscription: 'ADF-DevOps-ServiceConnection'   # ← Your service connection
              scriptType: 'FilePath'
              scriptPath: '$(Build.SourcesDirectory)/scripts/PrePostDeploymentScript.Ver2.ps1'
              scriptArguments: '-armTemplate "$(Pipeline.Workspace)/ArmTemplates/ARMTemplateForFactory.json" -ResourceGroupName "$(Prod_ResourceGroup)" -DataFactoryName "$(Prod_DataFactory)" -predeployment $true -deleteDeployment $false'
              azurePowerShellVersion: 'LatestVersion'
              pwsh: true

          # ============================================
          # Deploy ARM Template to Production
          # ============================================
          - task: AzureResourceManagerTemplateDeployment@3
            displayName: 'Deploy ARM Template to Prod Data Factory'
            inputs:
              deploymentScope: 'Resource Group'
              azureResourceManagerConnection: 'ADF-DevOps-ServiceConnection'
              subscriptionId: '$(SubscriptionId)'
              action: 'Create Or Update Resource Group'
              resourceGroupName: '$(Prod_ResourceGroup)'
              location: 'East Asia'                    # Change if needed
              templateLocation: 'Linked artifact'
              csmFile: '$(Pipeline.Workspace)/ArmTemplates/ARMTemplateForFactory.json'
              csmParametersFile: '$(Pipeline.Workspace)/ArmTemplates/ARMTemplateParametersForFactory.json'
              overrideParameters: '-factoryName $(Prod_DataFactory)'

          # ============================================
          # Post-deployment: Start triggers again
          # ============================================
          - task: AzurePowerShell@5
            displayName: 'Start ADF Triggers (Post-Deployment)'
            inputs:
              azureSubscription: 'ADF-DevOps-ServiceConnection'
              scriptType: 'FilePath'
              scriptPath: '$(Build.SourcesDirectory)/scripts/PrePostDeploymentScript.Ver2.ps1'
              scriptArguments: '-armTemplate "$(Pipeline.Workspace)/ArmTemplates/ARMTemplateForFactory.json" -ResourceGroupName "$(Prod_ResourceGroup)" -DataFactoryName "$(Prod_DataFactory)" -predeployment $false -deleteDeployment $true'
              azurePowerShellVersion: 'LatestVersion'
              pwsh: true
