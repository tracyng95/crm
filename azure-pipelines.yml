name: ADF-CI-Validate-and-Export

trigger:
  branches:
    include:
      - develop

pr:
  branches:
    include:
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  # === UPDATE THESE 3 VALUES ===
  SubscriptionId: 'xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx'
  ResourceGroupName: 'your-dev-rg'
  DataFactoryName: 'your-dev-adf-name'

steps:
- checkout: self

- task: NodeTool@1
  displayName: 'Install Node.js 20.x'
  inputs:
    versionSpec: '20.x'
    checkLatest: true

- task: Npm@1
  displayName: 'npm install'
  inputs:
    command: 'install'
    workingDir: '$(Build.SourcesDirectory)'   # Change this if package.json is in a subfolder (e.g. adf/)

- task: Npm@1
  displayName: 'Validate ADF Resources'
  inputs:
    command: 'custom'
    customCommand: 'run build validate $(Build.SourcesDirectory) /subscriptions/$(SubscriptionId)/resourceGroups/$(ResourceGroupName)/providers/Microsoft.DataFactory/factories/$(DataFactoryName)'
    workingDir: '$(Build.SourcesDirectory)'

- task: Npm@1
  displayName: 'Export ARM Template'
  inputs:
    command: 'custom'
    customCommand: 'run build export $(Build.SourcesDirectory) /subscriptions/$(SubscriptionId)/resourceGroups/$(ResourceGroupName)/providers/Microsoft.DataFactory/factories/$(DataFactoryName) $(Build.ArtifactStagingDirectory)/ArmTemplate'
    workingDir: '$(Build.SourcesDirectory)'

- task: PublishPipelineArtifact@1
  displayName: 'Publish ARM Template Artifact'
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)/ArmTemplate'
    artifact: 'ArmTemplates'
    publishLocation: 'pipeline'
