name: ADF-CD-Deploy-to-Production

on:
  workflow_dispatch:          # Manual trigger
  # Optional: Trigger automatically when CI uploads artifact
  # workflow_run:
  #   workflows: ["ADF-CI-Validate-and-Export"]
  #   types:
  #     - completed

permissions:
  id-token: write
  contents: read

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: Production          # GitHub Environment with approval + secrets
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================================
      # Download ARM Template from CI Artifact
      # ============================================
      - name: Download ARM Template Artifact
        uses: actions/download-artifact@v4
        with:
          name: ArmTemplates
          path: ./ArmTemplates

      # ============================================
      # DEBUG: Show folder structure
      # ============================================
      - name: 🔍 Debug - List Downloaded Files
        run: |
          echo "=== Workspace contents ==="
          ls -R .
          echo "=== ArmTemplates contents ==="
          ls -R ./ArmTemplates || echo "ArmTemplates folder not found"

      # ============================================
      # Azure Login with Workload Identity
      # ============================================
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ============================================
      # Pre-deployment: Stop Triggers
      # ============================================
      - name: Stop ADF Triggers (Pre-Deployment)
        uses: azure/powershell@v2
        with:
          inlineScript: |
            ./deploy_pipelines/scripts/PrePostDeploymentScript.Ver2.ps1 `
              -armTemplate "./ArmTemplates/ARMTemplateForFactory.json" `
              -ResourceGroupName "${{ vars.PROD_RESOURCE_GROUP }}" `
              -DataFactoryName "${{ vars.PROD_DATA_FACTORY }}" `
              -predeployment $true `
              -deleteDeployment $false
          azPSVersion: latest

      # ============================================
      # Deploy ARM Template to Production
      # ============================================
      - name: Deploy ARM Template to Prod Data Factory
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ vars.PROD_RESOURCE_GROUP }}
          template: ./ArmTemplates/ARMTemplateForFactory.json
          parameters: ./ArmTemplates/ARMTemplateParametersForFactory.json
          deploymentMode: Incremental
          overrideParameters: >
            factoryName=${{ vars.PROD_DATA_FACTORY }}

      # ============================================
      # Post-deployment: Start Triggers
      # ============================================
      - name: Start ADF Triggers (Post-Deployment)
        uses: azure/powershell@v2
        with:
          inlineScript: |
            ./deploy_pipelines/scripts/PrePostDeploymentScript.Ver2.ps1 `
              -armTemplate "./ArmTemplates/ARMTemplateForFactory.json" `
              -ResourceGroupName "${{ vars.PROD_RESOURCE_GROUP }}" `
              -DataFactoryName "${{ vars.PROD_DATA_FACTORY }}" `
              -predeployment $false `
              -deleteDeployment $true
          azPSVersion: latest
