name: ADF-CD-Deploy

on:
  push:
    branches: [ adf_publish ]     # Triggered when you click Publish in ADF Studio
  workflow_dispatch:              # Allow manual trigger

permissions:
  contents: read
  id-token: write                 # Required for OIDC authentication

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production         # Use this for manual approval gate (recommended for Prod)

    env:
      SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_PRD }}
      RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_PRD }}
      DATA_FACTORY_NAME: ${{ secrets.AZURE_DATA_FACTORY_NAME_PRD }}

    steps:
      - name: Checkout adf_publish branch
        uses: actions/checkout@v4
        with:
          ref: adf_publish

      - name: Azure Login (OIDC with Managed Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Deploy ARM Template to Data Factory
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_NAME }}
          template: ./armTemplate/ARMTemplateForFactory.json
          parameters: ./armTemplate/ARMTemplateParametersForFactory.json
          deploymentMode: Incremental
          deploymentName: ADF-Deploy-${{ github.run_number }}

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Target Factory : ${{ env.DATA_FACTORY_NAME }}"
          echo "Resource Group : ${{ env.RESOURCE_GROUP_NAME }}"
          echo "Run ID         : ${{ github.run_number }}"
