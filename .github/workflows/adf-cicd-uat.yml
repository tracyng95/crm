name: ADF-CICD-UAT

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  ci-validate-export:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install ADF Utilities
        run: npm ci

      - name: Validate ADF
        run: |
          echo "=== Validating ADF ==="
          npm run build validate . \
            /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AZURE_RESOURCE_GROUP }}/providers/Microsoft.DataFactory/factories/${{ secrets.AZURE_DATA_FACTORY_NAME }}

      - name: Export ARM Template
        uses: Azure/data-factory-export-action@v1.2.1
        with:
          path: '.' 
          id: /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AZURE_RESOURCE_GROUP }}/providers/Microsoft.DataFactory/factories/${{ secrets.AZURE_DATA_FACTORY_NAME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArmTemplates
          path: ./armTemplate
          retention-days: 30

  cd-deploy-uat:
    # if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: ci-validate-export

    env:
      SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP }}
      DATA_FACTORY_NAME: ${{ secrets.AZURE_DATA_FACTORY_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download Artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: ArmTemplates
          path: ./armTemplate

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Deploy to UAT
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_NAME }}
          template: ./armTemplate/ARMTemplateForFactory.json
          parameters: ./armTemplate/ARMTemplateParametersForFactory.json
          deploymentMode: Incremental
          deploymentName: ADF-UAT-Deploy-${{ github.run_number }}

      - name: Summary
        run: |
          echo 'Successfully deployed to UAT Factory: ${{ env.DATA_FACTORY_NAME }}'
