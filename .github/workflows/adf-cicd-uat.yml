name: ADF-CI-CD

on:
  # pull_request:
  #   branches: [ master ]
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
          deploy_uat:
            description: 'Deploy to UAT?'
            required: false
            default: true
            type: boolean
          deploy_prod:
            description: 'Deploy to PROD?'
            required: false
            default: false
            type: boolean
        
permissions:
  contents: read
  id-token: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  ci-validate-export:
    runs-on: ubuntu-latest

    steps:
      - name: Log the triggering event name
        run: echo "The workflow was triggered by the event -> ${{ github.event_name }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install ADF Utilities
        run: npm ci

      - name: Validate ADF
        run: |
          echo "=== Validating ADF ==="
          npm run build validate . \
            /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AZURE_RESOURCE_GROUP }}/providers/Microsoft.DataFactory/factories/${{ secrets.AZURE_DATA_FACTORY_NAME }}

      - name: Export ARM Template
        uses: Azure/data-factory-export-action@v1.2.1
        with:
          path: '.'
          id: /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AZURE_RESOURCE_GROUP }}/providers/Microsoft.DataFactory/factories/${{ secrets.AZURE_DATA_FACTORY_NAME }}
          continue-on-error: false

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArmTemplates
          path: ./armTemplate
          retention-days: 30

  cd-deploy-uat:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_uat == true)
    runs-on: ubuntu-latest
    needs: ci-validate-export
    environment: uat

    env:
      SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP }}
      DATA_FACTORY_NAME: ${{ secrets.AZURE_DATA_FACTORY_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Download Artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: ArmTemplates
          path: ./armTemplate

      - name: Azure Login (for ARM deploy)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Run Pre-Deployment Script (Stop Triggers)
        shell: pwsh
        run: |
          $token = az account get-access-token --resource-type arm --query accessToken -o tsv
          Connect-AzAccount -AccessToken $token -AccountId "${{ secrets.AZURE_CLIENT_ID }}"

          ./armTemplate/PrePostDeploymentScript.ps1 `
            -ArmTemplate "./armTemplate/ARMTemplateForFactory.json" `
            -ResourceGroupName "${{ env.RESOURCE_GROUP_NAME }}" `
            -DataFactoryName "${{ env.DATA_FACTORY_NAME }}" `
            -PreDeployment $true `
            -DeleteDeployment $false

      - name: Deploy ADF ARM Template (UAT)
        uses: Azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_NAME }}
          template: ./armTemplate/ARMTemplateForFactory.json
          parameters: ./armTemplate/ARMTemplateParametersForFactory.json
          deploymentMode: Incremental
          deploymentName: ADF-UAT-Deploy-${{ github.run_number }}

      - name: Run Post-Deployment Script (Start Triggers)
        shell: pwsh
        run: |
          $token = az account get-access-token --resource-type arm --query accessToken -o tsv
          Connect-AzAccount -AccessToken $token -AccountId "${{ secrets.AZURE_CLIENT_ID }}"

          ./armTemplate/PrePostDeploymentScript.ps1 `
            -ArmTemplate "./armTemplate/ARMTemplateForFactory.json" `
            -ResourceGroupName "${{ env.RESOURCE_GROUP_NAME }}" `
            -DataFactoryName "${{ env.DATA_FACTORY_NAME }}" `
            -PreDeployment $false `
            -DeleteDeployment $false

  cd-deploy-prd:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_prod == true)
    runs-on: ubuntu-latest
    # needs: cd-deploy-uat 
    needs: ci-validate-export
    environment: prod

    env:
      SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP }}
      DATA_FACTORY_NAME: ${{ secrets.AZURE_DATA_FACTORY_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Download Artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: ArmTemplates
          path: ./armTemplate

      # === Copy Prod-specific parameter file ===
      - name: Prepare Prod Parameter File
        run: |
          mkdir -p ./armTemplate
          cp .github/workflows/parameters/ARMTemplateParametersForFactory.prod.json ./armTemplate/ARMTemplateParametersForFactory.prod.json
          # cp .github/workflows/parameters/ARMTemplateForFactory.prod.json ./armTemplate/ARMTemplateForFactory.prod.json
          echo "✅ Using Prod-specific parameter file"

      - name: Azure Login (for ARM deploy)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Run Pre-Deployment Script (Stop Triggers)
        shell: pwsh
        run: |
          $token = az account get-access-token --resource-type arm --query accessToken -o tsv
          Connect-AzAccount -AccessToken $token -AccountId "${{ secrets.AZURE_CLIENT_ID }}"

          ./armTemplate/PrePostDeploymentScript.ps1 `
            -ArmTemplate "./armTemplate/ARMTemplateForFactory.json" `
            -ResourceGroupName "${{ env.RESOURCE_GROUP_NAME }}" `
            -DataFactoryName "${{ env.DATA_FACTORY_NAME }}" `
            -PreDeployment $true `
            -DeleteDeployment $false

      - name: Deploy ADF ARM Template (PROD)
        uses: Azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_NAME }}
          template: ./armTemplate/ARMTemplateForFactory.json
          parameters: ./armTemplate/ARMTemplateParametersForFactory.prod.json   # ← Prod file
          deploymentMode: Incremental
          deploymentName: ADF-PROD-Deploy-${{ github.run_number }}
          
      - name: Auto-Approve Private Endpoints (Prod)
        shell: pwsh
        run: |
          Write-Host "=== Auto-Approving Pending Private Endpoints ==="

          # === Storage Account ===
          Write-Host "`nChecking Storage Account: staciccrmprd001"
          try {
            $storagePending = az network private-endpoint-connection list `
              --resource-group ${{ env.RESOURCE_GROUP_NAME }} `
              --name staciccrmprd001 `
              --type Microsoft.Storage/storageAccounts `
              --query "[?properties.privateLinkServiceConnectionState.status=='Pending'].id" -o tsv 2>$null

            if ($storagePending) {
              $storagePending | ForEach-Object {
                Write-Host "Approving Storage endpoint: $_"
                az network private-endpoint-connection approve --id $_ --description "Approved by GitHub Actions" --output none
              }
              Write-Host "Storage endpoints approved."
            } else {
              Write-Host "No pending Storage private endpoints."
            }
          } catch {
            Write-Host "No Storage private endpoints found or error occurred (this is usually safe to ignore)."
          }

          # === PostgreSQL ===
          Write-Host "`nChecking PostgreSQL: pg-cic-crm-prd-01"
          try {
            $psqlPending = az network private-endpoint-connection list `
              --resource-group ${{ env.RESOURCE_GROUP_NAME }} `
              --name pg-cic-crm-prd-01 `
              --type Microsoft.DBforPostgreSQL/flexibleServers `
              --query "[?properties.privateLinkServiceConnectionState.status=='Pending'].id" -o tsv 2>$null

            if ($psqlPending) {
              $psqlPending | ForEach-Object {
                Write-Host "Approving PostgreSQL endpoint: $_"
                az network private-endpoint-connection approve --id $_ --description "Approved by GitHub Actions" --output none
              }
              Write-Host "PostgreSQL endpoints approved."
            } else {
              Write-Host "No pending PostgreSQL private endpoints."
            }
          } catch {
            Write-Host "No PostgreSQL private endpoints found or error occurred (this is usually safe to ignore)."
          }

          Write-Host "`n=== Private Endpoint Approval Check Completed ==="


      - name: Run Post-Deployment Script (Start Triggers)
        shell: pwsh
        run: |
          $token = az account get-access-token --resource-type arm --query accessToken -o tsv
          Connect-AzAccount -AccessToken $token -AccountId "${{ secrets.AZURE_CLIENT_ID }}"

          ./armTemplate/PrePostDeploymentScript.ps1 `
            -ArmTemplate "./armTemplate/ARMTemplateForFactory.json" `
            -ResourceGroupName "${{ env.RESOURCE_GROUP_NAME }}" `
            -DataFactoryName "${{ env.DATA_FACTORY_NAME }}" `
            -PreDeployment $false `
            -DeleteDeployment $false
