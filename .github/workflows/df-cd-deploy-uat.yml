name: ADF-CD-Deploy-UAT

on:
  push:
    branches: [ adf_publish ]
  workflow_dispatch:        # Manual trigger - very useful for you now

permissions:
  contents: read
  id-token: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  deploy-to-uat:
    runs-on: ubuntu-latest
    # No 'environment:' line = uses repository secrets

    env:
      SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP }}
      DATA_FACTORY_NAME: ${{ secrets.AZURE_DATA_FACTORY_NAME }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout adf_publish branch
        uses: actions/checkout@v4
        with:
          ref: adf_publish

      - name: Azure Login (OIDC - Managed Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Deploy ARM Template to UAT
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP_NAME }}
          template: ./armTemplate/ARMTemplateForFactory.json
          parameters: ./armTemplate/ARMTemplateParametersForFactory.json
          deploymentMode: Incremental
          deploymentName: ADF-UAT-Deploy-${{ github.run_number }}

      - name: Deployment Summary
        run: |
          echo "✅ Deployment to UAT completed!"
          echo "Factory : ${{ env.DATA_FACTORY_NAME }}"
          echo "RG      : ${{ env.RESOURCE_GROUP_NAME }}"
