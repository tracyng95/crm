name: ADF-CI-Validate-and-Export

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-export:
    runs-on: ubuntu-latest

    env:
      SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP_NAME: 'rg-cic-crm'
      DATA_FACTORY_NAME: 'adf-cic-crm-dev-001'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install ADF Utilities
        run: npm ci

      - name: Validate ADF Resources
        run: |
          echo "=== Validating ADF resources ==="
          npm run build validate . \
            /subscriptions/${{ env.SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP_NAME }}/providers/Microsoft.DataFactory/factories/${{ env.DATA_FACTORY_NAME }}

      - name: Export ARM Template (Official Action)
        uses: Azure/data-factory-export-action@v1.2.1
        with:
          path: '.' 
          id: /subscriptions/${{ env.SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP_NAME }}/providers/Microsoft.DataFactory/factories/${{ env.DATA_FACTORY_NAME }}

      - name: List Exported Files
        run: ls -laR ./ArmTemplate || echo "ArmTemplate folder not found"

      - name: Publish ARM Template Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArmTemplates
          path: ./ArmTemplate
          retention-days: 30
