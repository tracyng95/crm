name: ADF-CI-Validate-and-Export

on:
  push:
    branches: [ main ]
  # pull_request:
  #   branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Export ARM Template (Official Microsoft Action)
      uses: Azure/data-factory-export-action@v1
      with:
        path: '.'                          # Root of your ADF JSON files
        id: '/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ secrets.AZURE_RESOURCE_GROUP }}/providers/Microsoft.DataFactory/factories/${{ secrets.AZURE_DATA_FACTORY_NAME }}'
        output: './ArmTemplate'            # Output folder

    - name: List Exported Files
      run: ls -laR ./ArmTemplate || echo "No files generated"

    - name: Publish ARM Template Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ArmTemplates
        path: ./ArmTemplate
        retention-days: 30
